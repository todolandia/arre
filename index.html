<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Daniel Gómez</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:50px;
  padding:50px;
}

/* CARDS */
.card {
  background:white;
  color:black;
  padding:20px;
  border:4px solid gold;
  transform: rotate(-3deg);
  transition:0.3s;
}

.card:hover {
  transform: scale(1.05) rotate(3deg);
}

/* PLAYER */
.player {
  background:black;
  color:#00ff00;
  padding:10px;
  border:3px solid #00ff00;
  font-family: monospace;
}

.controls button {
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  margin:3px;
  cursor:pointer;
}

/* comentarios */
.comment-box {
  background:gold;
  margin-top:5px;
  padding:5px;
}

.slider .slide {display:none;}
.slider .active {display:block;}
.slider img {width:100%;}
</style>
</head>

<body>

<h1 style="text-align:center;color:gold;">Daniel Gómez</h1>

<div class="container">

<!-- PERFIL -->
<div class="card">
<h2>Perfil</h2>
No sé lo que hago pero funciona
</div>

<!-- SLIDE -->
<div class="card">
<h2>Dany chiquito</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<!-- 🎧 PLAYER -->
<div class="card">
<h2>🎧 Música</h2>

<div class="player">
<p>winamp.exe running...</p>

<audio id="audio">
<source src="https://raw.githubusercontent.com/todolandia/arre/main/song1.mp3">
</audio>

<div class="controls">
<button onclick="audio.play()">▶️</button>
<button onclick="audio.pause()">⏸</button>
<button onclick="restart()">⏭</button>
</div>

<input type="range" id="progress" value="0" style="width:100%">
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">

</div>
</div>

<!-- OTROS SLIDES -->
<div class="card">
<h2>Dany Punk juvenil</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<div class="card">
<h2>Dany teporocho</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<div class="card">
<h2>Dany malabarista</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<!-- JUEGO -->
<div class="card">
<h2>Juego</h2>
<button onclick="sumar()">Click</button>
<p><span id="score">0</span></p>
</div>

<!-- COMENTARIOS -->
<div class="card">
<h2>Comentarios</h2>
<input id="name" placeholder="Nombre">
<textarea id="comment"></textarea>
<button onclick="addComment()">Enviar</button>
<div id="commentsList"></div>
</div>

</div>

<script>
let score=0;
function sumar(){score++;document.getElementById("score").innerText=score;}

function next(btn){
 let s=btn.parentElement;
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i+1)%slides.length].classList.add("active");
}

function prev(btn){
 let s=btn.parentElement;
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i-1+slides.length)%slides.length].classList.add("active");
}

/* PLAYER */
let audio=document.getElementById("audio");
let progress=document.getElementById("progress");
let volume=document.getElementById("volume");

audio.ontimeupdate=()=>{
 progress.value=(audio.currentTime/audio.duration)*100;
};

progress.oninput=()=>{
 audio.currentTime=(progress.value/100)*audio.duration;
};

volume.oninput=()=>{
 audio.volume=volume.value;
};

function restart(){
 audio.currentTime=0;
 audio.play();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addComment = async function(){
 let name=document.getElementById("name").value;
 let text=document.getElementById("comment").value;
 if(!name||!text)return;

 await addDoc(collection(db,"comentarios"),{name,text});
};

onSnapshot(collection(db,"comentarios"),(snap)=>{
 let c=document.getElementById("commentsList");
 c.innerHTML="";
 snap.forEach(doc=>{
  let d=doc.data();
  let div=document.createElement("div");
  div.className="comment-box";
  div.innerHTML=`<b>${d.name}</b>: ${d.text}`;
  c.appendChild(div);
 });
});
</script>

</body>
</html>
