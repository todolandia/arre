<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Gómez</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ff0066;
}

/* fondo retro */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(45deg, yellow, yellow 10px, black 10px, black 20px);
  opacity: 0.1;
  z-index: -1;
}

h1 {
  font-size: 60px;
  color: yellow;
  text-shadow: 5px 5px black;
  text-align: center;
  margin-top:40px;
}

.header-img {
  display:block;
  margin:40px auto;
  width:250px;
  transform:rotate(-5deg);
  border:4px solid black;
  box-shadow:8px 8px 0 black;
}

.banner {
  text-align:center;
  background:yellow;
  padding:15px;
  font-weight:bold;
  margin:40px;
}

/* CONTENEDOR VERTICAL */
.container {
  max-width:700px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:50px; /* 🔥 más espacio */
  padding:20px;
}

.card {
  background:white;
  border:4px solid black;
  padding:20px;
  box-shadow:10px 10px 0 black;
  transform:rotate(-2deg);
  transition:0.3s;
}

.card:nth-child(even){
  transform:rotate(2deg);
}

.card:hover{
  transform:scale(1.05);
}

.btn {
  background:black;
  color:white;
  padding:8px;
  border:none;
  cursor:pointer;
}

.slider .slide { display:none; }
.slider .active { display:block; }
.slider img {
  width:100%;
  border:3px solid black;
}

.nav {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.comment-box {
  background:yellow;
  margin-top:10px;
  padding:8px;
}
</style>
</head>

<body>

<h1>Daniel Gómez</h1>

<img class="header-img" src="https://github.com/todolandia/arre/blob/main/grosero.jpg?raw=true">

<div class="banner">Mark Zuckerberg arruinó internet 😌</div>

<div class="container">

<div class="card">
<h2>Perfil</h2>
No sé lo que hago pero funciona
</div>

<div class="card">
<h2>Dany chiquito</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<!-- 🎧 MÚSICA FUNCIONANDO -->
<div class="card">
<h2>Música</h2>

<audio id="audio">
<source src="https://raw.githubusercontent.com/todolandia/arre/main/song1.mp3">
</audio>

<button class="btn" onclick="audio.play()">▶️ Play</button>
<button class="btn" onclick="audio.pause()">⏸ Pause</button>

</div>

<div class="card">
<h2>Dany Punk</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Dany teporocho</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Juego</h2>
<button class="btn" onclick="sumar()">Click</button>
<p><span id="score">0</span></p>
</div>

<div class="card">
<h2>Dany malabarista</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Comentarios</h2>
<input id="name" placeholder="Nombre" style="width:100%">
<textarea id="comment" placeholder="Mensaje" style="width:100%"></textarea>
<button class="btn" onclick="addComment()">Enviar</button>
<div id="commentsList"></div>
</div>

</div>

<script>
let score=0;
function sumar(){
  score++;
  document.getElementById("score").innerText=score;
}

function next(btn){
 let s=btn.closest(".slider");
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i+1)%slides.length].classList.add("active");
}

function prev(btn){
 let s=btn.closest(".slider");
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i-1+slides.length)%slides.length].classList.add("active");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addComment = async function(){
 let name=document.getElementById("name").value;
 let text=document.getElementById("comment").value;
 if(!name||!text)return;

 await addDoc(collection(db,"comentarios"),{name,text});
};

onSnapshot(collection(db,"comentarios"),(snap)=>{
 let c=document.getElementById("commentsList");
 c.innerHTML="";
 snap.forEach(doc=>{
  let d=doc.data();
  let div=document.createElement("div");
  div.className="comment-box";
  div.innerHTML=`<b>${d.name}</b>: ${d.text}`;
  c.appendChild(div);
 });
});
</script>

</body>
</html>
