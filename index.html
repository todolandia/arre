<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Daniel Gómez</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:50px;
  padding:50px;
}

/* CARDS */
.card {
  background:white;
  color:black;
  padding:20px;
  border:4px solid gold;
  transform: rotate(-3deg);
}

/* 🎧 PLAYER */
.player {
  background:black;
  color:#00ff00;
  padding:10px;
  border:3px solid #00ff00;
  font-family: monospace;
}

.controls button {
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  margin:3px;
  cursor:pointer;
}

.progress {
  width:100%;
}

</style>
</head>

<body>

<h1 style="text-align:center;color:gold;">Daniel Gómez</h1>

<div class="container">

<!-- PLAYER -->
<div class="card">
<h2>🎧 Música</h2>

<div class="player">
<p>Winamp vibes.exe</p>

<audio id="audio">
  <source src="https://raw.githubusercontent.com/todolandia/arre/main/song1.mp3">
</audio>

<div class="controls">
<button onclick="play()">▶️</button>
<button onclick="pause()">⏸</button>
<button onclick="nextSong()">⏭</button>
</div>

<input type="range" id="progress" class="progress" value="0">

<br>
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">

</div>
</div>

</div>

<script>
let audio = document.getElementById("audio");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");

function play(){ audio.play(); }
function pause(){ audio.pause(); }

audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = () => {
  audio.volume = volume.value;
};

function nextSong(){
  audio.currentTime = 0;
  audio.play();
}
</script>

</body>
</html>
