<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Gómez</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ff0066;
}

body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(45deg, yellow, yellow 10px, black 10px, black 20px);
  opacity: 0.1;
  z-index: -1;
}

h1 {
  font-size: 60px;
  color: yellow;
  text-shadow: 5px 5px black;
  text-align: center;
}

.header-img {
  display:block;
  margin:auto;
  width:250px;
  transform:rotate(-5deg);
  border:4px solid black;
  box-shadow:8px 8px 0 black;
}

.banner {
  text-align:center;
  background:yellow;
  padding:10px;
  font-weight:bold;
  margin:20px;
}

.container {
  max-width:700px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:40px;
}

.card {
  background:white;
  border:4px solid black;
  padding:15px;
  box-shadow:10px 10px 0 black;
  transform:rotate(-2deg);
}

.card:nth-child(even){
  transform:rotate(2deg);
}

.btn {
  background:black;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}

.irony {
  background:yellow;
  padding:5px;
}

.slider .slide { display:none; }
.slider .active { display:block; }
.slider img { width:100%; border:3px solid black; }

.nav {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.comment-box {
  margin-top:10px;
  padding:8px;
  background:yellow;
  border:2px solid black;
}
</style>
</head>

<body>

<h1>Daniel Gómez</h1>

<img class="header-img" src="https://images7.memedroid.com/images/UPLOADED333/614f61987d968.jpeg">

<div class="banner">Mark Zuckerberg arruinó internet 😌</div>

<div class="container">

<div class="card">
<h2>Perfil</h2>
<span class="irony">No sé lo que hago pero funciona</span>
</div>

<div class="card">
<h2>Dany chiquito</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Música</h2>
<button class="btn" onclick="playMusic()">Activar ruido</button>
</div>

<div class="card">
<h2>Dany mesero</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://picsum.photos/400?3"></div>
<div class="slide"><img src="https://picsum.photos/400?4"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Proyectos</h2>
<span class="irony">Funciona en mi máquina</span>
</div>

<div class="card">
<h2>Dany cajero</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://picsum.photos/400?5"></div>
<div class="slide"><img src="https://picsum.photos/400?6"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<div class="card">
<h2>Juego</h2>
<button class="btn" onclick="sumar()">Click</button>
<p>Clicks: <span id="score">0</span></p>
</div>

<div class="card">
<h2>Dany malabarista</h2>
<div class="slider" data-index="0">
<div class="slide active"><img src="https://picsum.photos/400?7"></div>
<div class="slide"><img src="https://picsum.photos/400?8"></div>
<div class="nav">
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>
</div>

<!-- COMENTARIOS -->
<div class="card">
<h2>Comentarios</h2>
<input id="name" placeholder="Nombre" style="width:100%;margin-bottom:5px;">
<textarea id="comment" placeholder="Mensaje" style="width:100%;height:60px;"></textarea>
<button class="btn" onclick="addComment()">Enviar</button>

<div id="commentsList"></div>
</div>

</div>

<script>
let score=0;
function sumar(){
  score++;
  document.getElementById("score").innerText=score;
}

function next(btn){
  let s=btn.closest(".slider");
  let i=parseInt(s.dataset.index);
  let slides=s.querySelectorAll(".slide");
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
  s.dataset.index=i;
}

function prev(btn){
  let s=btn.closest(".slider");
  let i=parseInt(s.dataset.index);
  let slides=s.querySelectorAll(".slide");
  slides[i].classList.remove("active");
  i=(i-1+slides.length)%slides.length;
  slides[i].classList.add("active");
  s.dataset.index=i;
}

function playMusic(){
  new Audio('song1.mp3').play();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f",
  storageBucket: "daniel-web-9d96f.firebasestorage.app",
  messagingSenderId: "97835808356",
  appId: "1:97835808356:web:78bd82b50bf4cdd8f59171"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addComment = async function(){
  let name=document.getElementById("name").value;
  let text=document.getElementById("comment").value;
  if(!name||!text)return;

  await addDoc(collection(db,"comentarios"),{
    name:name,
    text:text
  });

  document.getElementById("name").value="";
  document.getElementById("comment").value="";
};

onSnapshot(collection(db,"comentarios"),(snap)=>{
  let c=document.getElementById("commentsList");
  c.innerHTML="";
  snap.forEach(doc=>{
    let d=doc.data();
    let div=document.createElement("div");
    div.className="comment-box";
    div.innerHTML=`<b>${d.name}</b>: ${d.text}`;
    c.appendChild(div);
  });
});
</script>

</body>
</html>
