<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Gómez</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* fondo animado */
body::before {
  content: "";
  position: fixed;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, #ff0066, black, gold);
  animation: moveBg 20s infinite linear;
  z-index: -1;
  opacity: 0.4;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20%, -20%); }
  100% { transform: translate(0,0); }
}

h1 {
  text-align: center;
  font-size: 70px;
  color: gold;
  text-shadow: 0 0 20px #ff0066;
  animation: glitch 0.3s infinite;
  margin-bottom: 30px;
}

@keyframes glitch {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(2px, 2px); }
}

.header-img {
  display:block;
  margin:40px auto;
  width:250px;
  transform:rotate(-8deg);
  border:5px solid gold;
  box-shadow:10px 10px 20px black;
}

.banner {
  text-align:center;
  background:gold;
  color:black;
  padding:15px;
  font-weight:bold;
  margin:40px;
}

/* GRID MEJORADO */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  grid-auto-rows: 220px;
  gap:60px; /* 🔥 MÁS ESPACIO */
  padding:60px;
}

/* tamaños random */
.card:nth-child(3n) { grid-row: span 2; }
.card:nth-child(5n) { grid-column: span 2; }

.card {
  background:white;
  color:black;
  border:4px solid gold;
  padding:20px;
  transform: rotate(-3deg);
  transition:0.3s;
  animation: fadeIn 1s ease;
}

.card:hover {
  transform: scale(1.1) rotate(3deg);
  filter: contrast(150%) saturate(150%);
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(50px);}
  to {opacity:1;}
}

.slider img {
  width:100%;
  height:150px;
  object-fit:cover;
  border:2px solid black;
}

.btn {
  background:black;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
}

/* 🎧 PLAYER */
.player {
  background:black;
  color:#00ff00;
  padding:10px;
  border:3px solid #00ff00;
  font-family: monospace;
}

.comment-box {
  background:gold;
  margin-top:10px;
  padding:8px;
}
</style>
</head>

<body>

<h1>Daniel Gómez</h1>

<img class="header-img" src="https://github.com/todolandia/arre/blob/main/grosero.jpg?raw=true">

<div class="banner">Mark Zuckerberg arruinó internet 😌</div>

<div class="container">

<div class="card">
<h2>Perfil</h2>
No sé lo que hago pero funciona
</div>

<div class="card">
<h2>Dany chiquito</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/chiquito.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<!-- 🎧 PLAYER REAL -->
<div class="card">
<h2>🎧 Música</h2>

<div class="player">
<p>winamp vibes...</p>

<audio id="audio">
<source src="https://raw.githubusercontent.com/todolandia/arre/main/song1.mp3">
</audio>

<button onclick="audio.play()" class="btn">▶️ Play</button>
<button onclick="audio.pause()" class="btn">⏸ Pause</button>

</div>
</div>

<div class="card">
<h2>Dany Punk</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/punk.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<div class="card">
<h2>Dany teporocho</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/teporocho.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<div class="card">
<h2>Juego</h2>
<button class="btn" onclick="sumar()">Click</button>
<p><span id="score">0</span></p>
</div>

<div class="card">
<h2>Dany malabarista</h2>
<div class="slider">
<div class="slide active"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<div class="slide"><img src="https://github.com/todolandia/arre/blob/main/malabarista.jpg?raw=true"></div>
<button onclick="prev(this)">←</button>
<button onclick="next(this)">→</button>
</div>
</div>

<div class="card">
<h2>Comentarios</h2>
<input id="name" placeholder="Nombre">
<textarea id="comment" placeholder="Mensaje"></textarea>
<button onclick="addComment()">Enviar</button>
<div id="commentsList"></div>
</div>

</div>

<script>
let score=0;
function sumar(){score++;document.getElementById("score").innerText=score;}

function next(btn){
 let s=btn.parentElement;
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i+1)%slides.length].classList.add("active");
}

function prev(btn){
 let s=btn.parentElement;
 let slides=s.querySelectorAll(".slide");
 let i=[...slides].findIndex(e=>e.classList.contains("active"));
 slides[i].classList.remove("active");
 slides[(i-1+slides.length)%slides.length].classList.add("active");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBa4g0hbd1FckmtVsyStwSn-eiAdrmAOd0",
  authDomain: "daniel-web-9d96f.firebaseapp.com",
  projectId: "daniel-web-9d96f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addComment = async function(){
 let name=document.getElementById("name").value;
 let text=document.getElementById("comment").value;
 if(!name||!text)return;

 await addDoc(collection(db,"comentarios"),{name,text});
};

onSnapshot(collection(db,"comentarios"),(snap)=>{
 let c=document.getElementById("commentsList");
 c.innerHTML="";
 snap.forEach(doc=>{
  let d=doc.data();
  let div=document.createElement("div");
  div.className="comment-box";
  div.innerHTML=`<b>${d.name}</b>: ${d.text}`;
  c.appendChild(div);
 });
});
</script>

</body>
</html>
